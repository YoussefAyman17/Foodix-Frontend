<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg rounded-4 overflow-hidden" style="max-width: 900px; width: 100%;">

    <div class="row g-0">

      <div class="col-sm-6 d-none d-md-block">
        <img src="1.jpg" class="w-100 h-100 object-fit-cover" alt="food">
      </div>


      <div class="col-sm-6 d-flex align-items-center justify-content-center">
        <div style="width: 85%; max-width: 400px;">
          <h3 class="fw-bold mb-2">Sign up</h3>
          <p class="text-muted small">Let's get you all set up so you can access your account.</p>

          <form class="row g-3">

            <div class="col-12">
              <input type="text" class="form-control" placeholder="Full Name">
            </div>


            <div class="col-sm-12">
              <input type="email" class="form-control" placeholder="Email">
            </div>


            <!-- <div class="col-md-12">
              <input type="text" class="form-control" placeholder="Phone Number">
            </div> -->


            <div class="col-12">
              <input type="password" class="form-control" placeholder="Password">
            </div>


            <div class="col-12">
              <input type="password" class="form-control" placeholder="Confirm Password">
            </div>


            <div class="col-12 form-check">
              <input class="form-check-input" type="checkbox" id="terms">
              <label class="form-check-label small" for="terms">
                I agree to all the <span class="text-danger">Terms</span> and <span class="text-danger">Privacy
                  Policies</span>
              </label>
            </div>


            <div class="col-12">
              <button class="btn btn-dark w-100">Create account</button>
            </div>


            <div class="col-12 text-center small">
              Already have an account? <a routerLink="/login" class="text-danger text-decoration-none">Login</a>
            </div>


            <div class="col-12 text-center text-muted small">or sign up with</div>


            <div class="col-12">
              <button class="btn btn-outline-secondary w-100">
                <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" width="18">
                Sign up with Google
              </button>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
