<app-navbar></app-navbar>

<section class="nf-section">

    <!-- 404 Watermark -->
    <div class="nf-watermark" aria-hidden="true">404</div>

    <!-- Floating food emojis -->
    <div class="nf-floats" aria-hidden="true">
        <span class="nf-float nf-float--1">🍔</span>
        <span class="nf-float nf-float--2">🍕</span>
        <span class="nf-float nf-float--3">🌮</span>
        <span class="nf-float nf-float--4">🍟</span>
        <span class="nf-float nf-float--5">🧆</span>
        <span class="nf-float nf-float--6">🍗</span>
        <span class="nf-float nf-float--7">🥗</span>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 text-center nf-content">

                <!-- Icon -->
                <div class="nf-icon-wrap mx-auto mb-4">
                    <span class="nf-icon" role="img" aria-label="Empty plate">🍽️</span>
                    <span class="nf-icon-badge" aria-hidden="true">
                        <i class="bi bi-x-lg"></i>
                    </span>
                </div>

                <!-- Headline -->
                <h1 class="nf-headline">

                    <h1 class="nf-headline--accent fw-bold fs-1">Page Not Found</h1>
                </h1>

                <!-- Divider -->
                <div class="nf-divider mx-auto my-4"></div>

                <!-- Description -->
                <p class="nf-description fw-bold fs-4">
                    We can't find the page you're looking for
                </p>

                <!-- CTA Button -->
                <a routerLink="/home" class="btn nf-btn mt-2">
                    <i class="bi bi-house-fill me-2"></i>
                    Back to Home
                </a>

            </div>
        </div>
    </div>

</section>

<app-footer></app-footer>
