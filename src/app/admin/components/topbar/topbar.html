<header
  class="topbar d-flex align-items-center justify-content-between px-4 bg-white border-bottom"
>
  <div class="search-container position-relative">
    <i class="bi bi-search search-icon position-absolute text-muted"></i>
    <input
      type="text"
      class="form-control search-input"
      placeholder="Search orders, customers, meals..."
    />
  </div>

  <div class="right-section d-flex align-items-center gap-4">
    <div class="notification-icon position-relative cursor-pointer">
      <i class="bi bi-bell fs-5 text-secondary"></i>
      <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
        3
      </span>
    </div>

    <div class="user-profile d-flex align-items-center gap-2 cursor-pointer">
      <div
        class="avatar rounded-circle d-flex align-items-center justify-content-center text-white"
      >
        A
      </div>
      <span class="text-dark fw-medium">Admin</span>
    </div>
  </div>
</header>
