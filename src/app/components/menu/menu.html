<section class="py-5" style="background-color: #f7f1e1">
    <div class="container">

        <div class="text-center mb-5">
            <h1 class="fw-bold">CHOOSE MENU</h1>
            <p class="fw-bold text-muted">
                Indulge in an array of meticulously crafted sushi rolls, artfully
                blending <br />
                fresh ingredients for a delightful taste experience.
            </p>
        </div>

        <!-- بدل الأزرار: sections قابلة للضغط -->
        <div class="d-flex mx-auto justify-content-center gap-4 pb-5 flex-wrap">
            <div *ngFor="let cat of categories" class="category-card text-center"
                [class.active]="activeCategory === cat.slug" (click)="getProducts(cat.slug)"
                style="cursor: pointer; width: 120px;">

                <!-- صورة الكاتيجوري -->
                <div class="category-img-wrapper rounded-circle overflow-hidden mx-auto mb-2"
                    style="width: 80px; height: 80px; border: 3px solid transparent;">
                    <img [src]="cat.image" [alt]="cat.name" style="width: 100%; height: 100%; object-fit: cover;">
                </div>

                <p class="fw-bold mb-0">{{ cat.name }}</p>
            </div>
        </div>

        <!-- الكاردز زي ما هي -->
        <div class="row g-4" id="menuSection">
            <div class="col-12 col-sm-6 col-lg-4" *ngFor="let p of meals">
                <!-- نفس الكارد القديمة -->
            </div>
        </div>

    </div>
</section>
