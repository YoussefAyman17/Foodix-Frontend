<app-navbar></app-navbar>
<section class="py-5" style="background-color: #f7f1e1">
  <div class="container">
    <div class="text-center mb-5">
      <h1 class="fw-bold">CHOOSE MENU</h1>
      <p class="fw-bold text-muted">
        Indulge in an array of meticulously crafted sushi rolls, artfully blending <br />
        fresh ingredients for a delightful taste experience.
      </p>
    </div>

    <div class="d-flex mx-auto justify-content-center gap-4 pb-5 flex-wrap">
      <button
        *ngFor="let cat of categories"
        type="button"
        class="btn2 px-4 py-2 fw-bold rounded-3"
        [class.active]="activeCategory === cat.slug"
        (click)="getProducts(cat.slug)"
      >
        {{ cat.name }}
      </button>
    </div>

    <div class="row g-4">
      <div class="col-12 col-sm-6 col-lg-4" *ngFor="let p of meals">
        <div class="card_menu card shadow rounded-4 d-flex flex-column justify-content-between">
          <img [src]="p.img || p.image" class="card-img-top rounded-top-4" [alt]="p.name" />
          <div
            class="card-header bg-white border-0 d-flex justify-content-between align-items-center pt-3 px-0 border-bottom mx-3 mb-3"
          >
            <span class="text-danger fw-bold fs-5">${{ p.price }}</span>
            <span class="text-muted fs-6">
              <i style="color: gold" class="fa-solid fa-star"></i>
              {{ p.rating }}
            </span>
          </div>

          <div class="card-body pt-2">
            <h5 class="fw-bold mb-3 text_menu_card">{{ p.name }}</h5>
            <p class="text-muted mb-3">
              <i class="fa-regular fa-circle-check text-danger me-2"></i>
              {{ p.short_description }}
            </p>

            <button
              class="border_menu btn w-100 fw-bold rounded-3 py-2"
              style="border: 2px solid black; color: #333"
              [routerLink]="['/product', activeCategory, p.itemId]"
            >
              <i class="bi bi-cart3 me-2"></i> Add to Cart
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<app-footer></app-footer>
